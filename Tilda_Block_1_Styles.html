<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARGET FAMILY | Система набора подписчиков</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Премиальная шрифтовая пара -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                    },
                    colors: {
                        bg: '#F8FAFC', // Очень светлый серо-голубой (Slate 50)
                        surface: '#FFFFFF', // Чистый белый для карточек и блоков
                        dark: '#0F172A', // Темно-синий/серый для заголовков (Slate 900)
                        textMain: '#334155', // Основной текст с более высоким контрастом
                        accent: '#5673FF', // MAX electric blue
                        accentDark: '#914BFF', // MAX violet
                    }
                }
            }
        }
    </script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        /* Tilda overrides to prevent link colors breaking */
        a, a:hover, a:focus, a:active {
            color: inherit;
        }
        .text-accent { color: #5673FF !important; }
        .text-accentDark { color: #914BFF !important; }
        .text-white { color: #ffffff !important; }
        .text-dark { color: #0F172A !important; }
        .text-textMain { color: #334155 !important; }
        .bg-accent { background-color: #5673FF !important; }
        .hover\:bg-accentDark:hover { background-color: #914BFF !important; }
        .hover\:text-accent:hover { color: #5673FF !important; }
        .hover\:text-accentDark:hover { color: #914BFF !important; }
        nav a {
            color: #334155 !important;
        }
        nav a:hover, nav a.nav-active {
            color: #5673FF !important;
        }
        button, .cta-pulse {
            color: #ffffff !important;
        }


        :root {
            --max-blue-rgb: 86, 115, 255;
            --max-violet-rgb: 145, 75, 255;
            --max-sky-rgb: 126, 210, 255;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --shadow-soft: 0 20px 60px rgba(15, 23, 42, 0.08);
            --shadow-accent: 0 20px 50px rgba(var(--max-blue-rgb), 0.2);
            --ink-strong: #0f172a;
            --ink-main: #334155;
            --ink-soft: #5b667a;
            --line-soft: rgba(148, 163, 184, 0.26);
        }

        html {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(var(--max-blue-rgb), 0.12), transparent 28%),
                radial-gradient(circle at 82% 12%, rgba(var(--max-violet-rgb), 0.08), transparent 24%),
                linear-gradient(180deg, #F7F8FF 0%, #F8FAFC 58%, #EEF2FF 100%);
            color: var(--ink-main);
            -webkit-font-smoothing: antialiased;
            padding-bottom: 108px;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        img,
        svg {
            max-width: 100%;
        }

        section,
        nav,
        footer {
            position: relative;
            z-index: 1;
        }

        section[id] {
            scroll-margin-top: 112px;
        }

        /* Мягкое свечение на фоне для светлой темы */
        .glow-bg {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(var(--max-blue-rgb), 0.14) 0%, rgba(248, 250, 252, 0) 70%);
            top: -100px;
            right: -100px;
            z-index: -1;
            border-radius: 50%;
        }

        .glow-bg-2 {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(var(--max-violet-rgb), 0.12) 0%, rgba(248, 250, 252, 0) 70%);
            bottom: 10%;
            left: -300px;
            z-index: -1;
            border-radius: 50%;
        }

        .mesh-overlay {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(148, 163, 184, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.08) 1px, transparent 1px);
            background-size: 42px 42px;
            -webkit-mask-image: radial-gradient(circle at center, black 32%, transparent 82%);
            mask-image: radial-gradient(circle at center, black 32%, transparent 82%);
            pointer-events: none;
            opacity: 0.45;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            -webkit-backdrop-filter: blur(18px);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: var(--shadow-soft);
        }

        .floating-nav {
            width: min(calc(100% - 16px), 80rem);
            margin-top: 14px;
            border-radius: 999px;
            border: 1px solid rgba(226, 232, 240, 0.9);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }

        .brand-kicker {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(255, 255, 255, 0.72);
            color: #0f172a;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            box-shadow: 0 14px 35px rgba(15, 23, 42, 0.05);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .brand-kicker::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgb(var(--max-blue-rgb)), rgb(var(--max-violet-rgb)));
            box-shadow: 0 0 0 6px rgba(var(--max-blue-rgb), 0.14);
        }

        .floating-orb {
            position: absolute;
            border-radius: 999px;
            filter: blur(10px);
            opacity: 0.7;
            animation: floatY 8s ease-in-out infinite;
        }

        .floating-orb--one {
            width: 140px;
            height: 140px;
            top: 8%;
            right: 8%;
            background: radial-gradient(circle, rgba(var(--max-blue-rgb), 0.34), rgba(var(--max-blue-rgb), 0));
        }

        .floating-orb--two {
            width: 180px;
            height: 180px;
            left: -5%;
            bottom: 12%;
            background: radial-gradient(circle, rgba(var(--max-violet-rgb), 0.2), rgba(var(--max-violet-rgb), 0));
            animation-delay: -2s;
        }

        .floating-orb--three {
            width: 220px;
            height: 220px;
            left: 18%;
            top: 12%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0));
            animation-duration: 11s;
            animation-delay: -4s;
            filter: blur(18px);
        }

        .tilt-card {
            transform: perspective(1600px) rotateY(-9deg) rotateX(3deg);
            transform-style: preserve-3d;
        }

        .metric-card {
            transition:
                transform 0.5s var(--ease-out-expo),
                box-shadow 0.5s var(--ease-out-expo),
                border-color 0.3s ease;
        }

        .metric-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-soft);
            border-color: rgba(var(--max-blue-rgb), 0.24);
        }

        .hero-stage {
            min-height: 100svh;
            display: flex;
            align-items: center;
            padding-top: 108px;
            padding-bottom: 28px;
        }

        .hero-stage__inner {
            width: min(100%, 88rem);
            margin: 0 auto;
        }

        .hero-stage__grid {
            align-items: center;
        }

        .hero-copy {
            max-width: 42rem;
        }

        .hero-flow-shell {
            position: relative;
            min-height: 620px;
            overflow: hidden;
            border-radius: 2rem;
            border: 1px solid rgba(226, 232, 240, 0.92);
            background:
                radial-gradient(circle at 16% 12%, rgba(var(--max-blue-rgb), 0.2), transparent 25%),
                radial-gradient(circle at 84% 14%, rgba(var(--max-violet-rgb), 0.2), transparent 25%),
                linear-gradient(145deg, rgba(255, 255, 255, 0.98) 0%, rgba(247, 248, 255, 0.98) 55%, rgba(238, 242, 255, 0.98) 100%);
            box-shadow: 0 32px 80px rgba(15, 23, 42, 0.1);
            padding: 30px;
            isolation: isolate;
        }

        .hero-flow-shell::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(148, 163, 184, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.08) 1px, transparent 1px);
            background-size: 34px 34px;
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 86%);
            mask-image: radial-gradient(circle at center, black 40%, transparent 86%);
            opacity: 0.55;
            pointer-events: none;
            z-index: 0;
        }

        .hero-flow-content {
            position: relative;
            z-index: 2;
            display: grid;
            gap: 24px;
            height: 100%;
            align-content: space-between;
        }

        .hero-flow-intro {
            display: grid;
            gap: 10px;
            max-width: 28rem;
        }

        .hero-flow-label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            width: fit-content;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(226, 232, 240, 0.92);
            color: #0f172a;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            box-shadow: var(--shadow-soft);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
        }

        .hero-flow-label::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgb(var(--max-blue-rgb)), rgb(var(--max-violet-rgb)));
            box-shadow: 0 0 0 6px rgba(var(--max-blue-rgb), 0.12);
        }

        .hero-flow-heading {
            color: #0f172a;
            font-size: clamp(1.5rem, 2.2vw, 2rem);
            line-height: 1.15;
            font-weight: 800;
        }

        .hero-flow-stack {
            display: grid;
            gap: 18px;
        }

        .hero-flow-row {
            --flow-delay: 0s;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(110px, 0.55fr) minmax(0, 0.82fr);
            gap: 18px;
            align-items: center;
        }

        .hero-flow-chip {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 7px;
            min-height: 120px;
            padding: 22px 24px;
            border-radius: 30px;
            border: 1px solid rgba(226, 232, 240, 0.95);
            box-shadow: var(--shadow-soft);
            -webkit-backdrop-filter: blur(14px);
            backdrop-filter: blur(14px);
        }

        .hero-flow-chip--source {
            background: rgba(255, 255, 255, 0.88);
            animation: heroChipFloat 7s ease-in-out infinite;
            animation-delay: var(--flow-delay);
        }

        .hero-flow-chip--target {
            background: linear-gradient(135deg, rgba(var(--max-blue-rgb), 0.18), rgba(var(--max-violet-rgb), 0.28));
            border-color: rgba(var(--max-blue-rgb), 0.22);
            box-shadow: var(--shadow-accent);
            animation: heroChipFloat 7s ease-in-out infinite;
            animation-delay: calc(var(--flow-delay) + 0.3s);
        }

        .hero-flow-chip__eyebrow {
            color: #64748b;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        .hero-flow-chip--target .hero-flow-chip__eyebrow {
            color: rgba(57, 73, 198, 0.76);
        }

        .hero-flow-chip__title {
            color: #0f172a;
            font-size: clamp(1.9rem, 3.2vw, 2.6rem);
            line-height: 0.96;
            font-weight: 800;
        }

        .hero-flow-chip__caption {
            color: var(--ink-main);
            font-size: 14px;
            line-height: 1.5;
        }

        .hero-flow-rail {
            position: relative;
            height: 12px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(203, 213, 225, 0.55), rgba(var(--max-blue-rgb), 0.2), rgba(var(--max-violet-rgb), 0.24));
            overflow: hidden;
        }

        .hero-flow-rail::before,
        .hero-flow-rail::after {
            content: "";
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }

        .hero-flow-rail::before {
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(var(--max-blue-rgb), 0.4), rgba(var(--max-violet-rgb), 0.45), transparent);
            transform: translateX(-120%);
            animation: heroRailSweep 3.3s linear infinite;
            animation-delay: var(--flow-delay);
        }

        .hero-flow-rail::after {
            width: 14px;
            height: 14px;
            left: 0;
            border-radius: 999px;
            background: linear-gradient(135deg, rgb(var(--max-blue-rgb)), rgb(var(--max-violet-rgb)));
            box-shadow: 0 0 0 7px rgba(var(--max-blue-rgb), 0.12);
            transform: translate(-140%, -50%);
            animation: heroRailDot 3.3s linear infinite;
            animation-delay: var(--flow-delay);
        }

        .hero-flow-summary {
            display: grid;
            gap: 12px;
        }

        .hero-flow-summary__row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 12px;
            align-items: center;
            color: #0f172a;
            font-size: clamp(1.05rem, 1.5vw, 1.25rem);
            font-weight: 800;
        }

        .hero-flow-summary__arrow {
            color: #64748b;
        }

        .hero-flow-summary__target {
            color: #3949c6;
        }

        .cta-pulse {
            position: relative;
            overflow: hidden;
            isolation: isolate;
        }

        .cta-form-button {
            min-height: 58px;
            padding: 16px 36px !important;
            font-size: 1.03rem !important;
            line-height: 1.1;
        }

        .cta-form-button--nav {
            min-height: 50px;
            padding: 12px 24px !important;
            font-size: 0.98rem !important;
        }

        .lead-popup {
            position: fixed;
            inset: 0;
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.28s ease, visibility 0.28s ease;
        }

        .lead-popup.is-visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .lead-popup__backdrop {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.56);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .lead-popup__dialog {
            position: relative;
            width: min(100%, 36rem);
            padding: 28px;
            border-radius: 28px;
            border: 1px solid rgba(226, 232, 240, 0.92);
            background:
                radial-gradient(circle at top right, rgba(var(--max-blue-rgb), 0.2), transparent 34%),
                radial-gradient(circle at bottom left, rgba(var(--max-violet-rgb), 0.14), transparent 34%),
                rgba(255, 255, 255, 0.98);
            box-shadow: 0 34px 90px rgba(15, 23, 42, 0.24);
        }

        .lead-popup__close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 42px;
            height: 42px;
            border: 0;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.06);
            color: #0f172a !important;
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .lead-popup__close:hover {
            background: rgba(15, 23, 42, 0.12);
            transform: scale(1.04);
        }

        .lead-popup__eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(255, 255, 255, 0.78);
            color: #0f172a;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .lead-popup__eyebrow::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgb(var(--max-blue-rgb)), rgb(var(--max-violet-rgb)));
            box-shadow: 0 0 0 6px rgba(var(--max-blue-rgb), 0.12);
        }

        .lead-popup__title {
            margin: 0 0 14px;
            color: #0f172a;
            font-size: clamp(2rem, 4vw, 2.8rem);
            line-height: 1.02;
            font-weight: 800;
        }

        .lead-popup__text {
            margin: 0 0 24px;
            color: #334155;
            font-size: 1.02rem;
            line-height: 1.65;
        }

        .lead-popup__actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .cta-pulse::after {
            content: "";
            position: absolute;
            inset: -120%;
            background: linear-gradient(120deg, transparent 35%, rgba(255, 255, 255, 0.42) 50%, transparent 65%);
            transform: translateX(-55%) rotate(12deg);
            animation: ctaShine 5.5s linear infinite;
            z-index: -1;
        }

        [data-reveal] {
            opacity: 0;
            transform: translateY(32px) scale(0.985);
            transition:
                opacity 0.8s var(--ease-out-expo),
                transform 0.8s var(--ease-out-expo);
            transition-delay: var(--reveal-delay, 0ms);
            will-change: opacity, transform;
        }

        [data-reveal].is-visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        [data-reveal="left"] {
            transform: translateX(-42px);
        }

        [data-reveal="right"] {
            transform: translateX(42px);
        }

        [data-reveal="zoom"] {
            transform: translateY(26px) scale(0.94);
        }

        [data-reveal="left"].is-visible,
        [data-reveal="right"].is-visible,
        [data-reveal="zoom"].is-visible {
            transform: translate(0, 0) scale(1);
        }

        .problem-visual {
            position: relative;
            overflow: hidden;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background:
                radial-gradient(circle at 14% 16%, rgba(var(--max-blue-rgb), 0.22), transparent 22%),
                radial-gradient(circle at 86% 16%, rgba(var(--max-violet-rgb), 0.22), transparent 22%),
                linear-gradient(160deg, #111827 0%, #1f2340 48%, #281d47 100%);
            box-shadow: 0 30px 70px rgba(15, 23, 42, 0.18);
            padding: 28px;
        }

        .problem-visual-track {
            position: relative;
            z-index: 1;
            display: grid;
            gap: 16px;
        }

        .problem-stage-card {
            position: relative;
            border-radius: 1.5rem;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .problem-stage-card small {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.58);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        .problem-stage-card h3 {
            font-size: 22px;
            line-height: 1.05;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .problem-stage-card p {
            font-size: 13px;
            line-height: 1.55;
            color: rgba(226, 232, 240, 0.86);
        }

        .problem-stage-card--danger {
            background: rgba(248, 113, 113, 0.12);
            border-color: rgba(248, 113, 113, 0.28);
        }

        .problem-arrow {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .problem-arrow span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: white;
            box-shadow: 0 16px 30px rgba(15, 23, 42, 0.22);
        }

        .problem-alert {
            position: relative;
            z-index: 1;
            margin-top: 18px;
            display: flex;
            align-items: start;
            gap: 12px;
            padding: 16px 18px;
            border-radius: 1.5rem;
            background: rgba(248, 113, 113, 0.14);
            border: 1px solid rgba(248, 113, 113, 0.24);
            color: white;
        }

        .problem-alert strong {
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
            font-weight: 800;
        }

        .problem-alert p {
            font-size: 13px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.78);
        }

        .diagram-shell {
            position: relative;
            min-height: 640px;
            overflow: hidden;
            border-radius: 1.75rem;
            border: 1px solid rgba(226, 232, 240, 0.9);
            background:
                radial-gradient(circle at 15% 15%, rgba(var(--max-blue-rgb), 0.18), transparent 24%),
                radial-gradient(circle at 85% 20%, rgba(var(--max-violet-rgb), 0.16), transparent 24%),
                linear-gradient(180deg, #ffffff 0%, #f8fafc 55%, #eef2f7 100%);
            box-shadow: 0 25px 70px rgba(15, 23, 42, 0.08);
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            grid-template-areas:
                "traffic note"
                "traffic landing"
                "max landing"
                "max content"
                "result result";
            gap: 18px;
            padding: 28px;
            align-items: start;
        }

        .diagram-shell {
            min-height: auto;
            display: block;
            background:
                radial-gradient(circle at 16% 12%, rgba(var(--max-blue-rgb), 0.2), transparent 24%),
                radial-gradient(circle at 86% 16%, rgba(var(--max-violet-rgb), 0.18), transparent 24%),
                linear-gradient(180deg, #ffffff 0%, #f7f8ff 58%, #eef2ff 100%);
        }

        .diagram-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(148, 163, 184, 0.09) 1px, transparent 1px),

                inset 0 1px 2px rgba(15, 23, 42, 0.04),
                0 10px 24px rgba(15, 23, 42, 0.04);
        }

        /* === ENHANCEMENTS === */
        /* Nav shrink on scroll */
        .floating-nav {
            transition: height 0.4s var(--ease-out-expo), box-shadow 0.4s ease, border-color 0.3s ease;
        }

        nav.is-scrolled .floating-nav {
            height: 60px !important;
            box-shadow: 0 22px 55px rgba(15, 23, 42, 0.12);
            border-color: rgba(203, 213, 225, 0.95);
        }

        /* Active nav link */
        nav a.nav-active {
            color: rgb(var(--max-blue-rgb)) !important;
            position: relative;
        }

        nav a.nav-active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgb(var(--max-blue-rgb)), rgb(var(--max-violet-rgb)));
        }

        /* Connector pulse */
        .diagram-connector span {
            animation: connectorPulse 2.8s ease-in-out infinite;
        }

        @keyframes connectorPulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 18px 34px rgba(86, 115, 255, 0.12);
            }

            50% {
                transform: scale(1.12);
                box-shadow: 0 18px 40px rgba(86, 115, 255, 0.24);
            }
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0.55;
            animation: scrollBounce 2.4s ease-in-out infinite;
            z-index: 10;
        }

        .scroll-indicator__mouse {
            width: 26px;
            height: 40px;
            border-radius: 999px;
            border: 2px solid var(--ink-strong);
            position: relative;
        }

        .scroll-indicator__dot {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 8px;
            border-radius: 999px;
            background: var(--ink-strong);
            animation: scrollDotMove 2.4s ease-in-out infinite;
        }

        .scroll-indicator__text {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-soft);
        }

        @keyframes scrollBounce {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(8px);
            }
        }

        @keyframes scrollDotMove {

            0%,
            100% {
                opacity: 1;
                top: 8px;
            }

            50% {
                opacity: 0.3;
                top: 20px;
            }
        }

        /* Marquee gradient fade */
        .marquee-band::before,
        .marquee-band::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 80px;
            z-index: 2;
            pointer-events: none;
        }

        .marquee-band::before {
            left: 0;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.95), transparent);
        }

        .marquee-band::after {
            right: 0;
            background: linear-gradient(-90deg, rgba(255, 255, 255, 0.95), transparent);
        }

        /* Progress line in roadmap */
        .roadmap-progress {
            position: absolute;
            top: 50%;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, rgb(var(--max-blue-rgb)), rgb(var(--max-violet-rgb)));
            transform: translateY(-50%);
            width: 0;
            transition: width 1.2s var(--ease-out-expo);
            border-radius: 999px;
            z-index: 1;
        }

        .roadmap-progress.is-active {
            width: 100%;
        }

        /* Card 3D tilt */
        .audience-card {
            transition: transform 0.5s var(--ease-out-expo), box-shadow 0.5s var(--ease-out-expo), border-color 0.3s ease;
        }

        .audience-card:hover {
            transform: translateY(-8px) perspective(800px) rotateX(2deg) rotateY(-2deg) !important;
            box-shadow: 0 28px 60px rgba(15, 23, 42, 0.1) !important;
        }

        /* CountUp flash */
        .metric-card .count-up {
            display: inline-block;
        }

        .metric-card .count-up.is-counted {
            animation: countFlash 0.6s ease-out;
        }

        @keyframes countFlash {
            0% {
                text-shadow: 0 0 20px rgba(var(--max-blue-rgb), 0.5);
            }

            100% {
                text-shadow: none;
            }
        }

        /* Staggered cards for dark panel */
        .stagger-card {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.6s var(--ease-out-expo), transform 0.6s var(--ease-out-expo);
        }

        .stagger-card.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Enhanced shimmer for primary CTA */
        .cta-pulse::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(105deg, transparent 40%, rgba(255, 255, 255, 0.3) 50%, transparent 60%);
            transform: translateX(-100%);
            animation: shimmerSlide 4s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes shimmerSlide {

            0%,
            100% {
                transform: translateX(-100%);
            }

            50% {
                transform: translateX(100%);
            }
        }

        /* Hide scroll indicator on mobile */
        @media (max-width: 1023px) {
            .scroll-indicator {
                display: none;
            }
        }

        @keyframes floatY {

            0%,
            100% {
                transform: translate3d(0, 0, 0);
            }

            50% {
                transform: translate3d(0, -18px, 0);
            }
        }

        @keyframes ctaShine {
            from {
                transform: translateX(-55%) rotate(12deg);
            }

            to {
                transform: translateX(55%) rotate(12deg);
            }
        }

        @keyframes heroChipFloat {

            0%,
            100% {
                transform: translate3d(0, 0, 0);
            }

            50% {
                transform: translate3d(0, -6px, 0);
            }
        }

        @keyframes heroRailSweep {
            from {
                transform: translateX(-120%);
            }

            to {
                transform: translateX(120%);
            }
        }

        @keyframes heroRailDot {
            from {
                transform: translate(-140%, -50%);
            }

            to {
                transform: translate(calc(100% + 18px), -50%);
            }
        }

        @keyframes pathFlow {
            from {
                stroke-dashoffset: 0;
            }

            to {
                stroke-dashoffset: -220;
            }
        }

        @keyframes marqueeMove {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }

        @keyframes pulseRing {
            0% {
                box-shadow: 0 0 0 0 rgba(var(--max-blue-rgb), 0.45);
            }

            70% {
                box-shadow: 0 0 0 14px rgba(var(--max-blue-rgb), 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(var(--max-blue-rgb), 0);
            }
        }

        @keyframes resultPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.025);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }

            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
            }

            [data-reveal] {
                opacity: 1;
                transform: none !important;
            }
        }

        @media (min-width: 1024px) {
            .hero-stage {
                min-height: calc(100dvh - 40px);
                padding-top: 84px;
                padding-bottom: 0px;
            }

            .hero-stage__grid {
                min-height: calc(100dvh - 110px);
                grid-template-columns: minmax(0, 1.62fr) minmax(320px, 0.7fr);
                gap: clamp(2rem, 3vw, 3.25rem);
            }

            .hero-copy {
                max-width: 54rem;
            }

            .hero-copy .brand-kicker {
                margin-bottom: 0.85rem;
            }

            .hero-copy .flex.flex-wrap {
                margin-bottom: 0.95rem;
            }

            .hero-copy h1 {
                max-width: 16.8ch;
                font-size: clamp(3.7rem, 5vw, 5.45rem);
                line-height: 0.92;
                margin-bottom: 1.05rem;
                text-wrap: balance;
            }

            .hero-copy .hero-keep-line {
                white-space: nowrap;
            }

            .hero-copy p.text-lg {
                max-width: 43rem;
                margin-bottom: 1.6rem;
                font-size: 1.02rem;
                line-height: 1.6;
            }

            #problem .max-w-3xl,
            #for-whom .max-w-3xl,
            #process .max-w-3xl {
                max-width: 56rem;
            }
